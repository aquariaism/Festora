<!doctype html>
<html lang="en">
  <head>
    <title>Login | Festora</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/signup.css" />
  </head>

  <body>
    <!--navbar-->
    <header class="navbar">
      <div class="logo">
        <img src="/Assets/logo/festo-logo.svg" alt="Festora official logo" />
        <span>Festora</span>
      </div>
    </header>

    <!--logins-->
    <section class="auth-section">
      <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="sub-text">Login to continue exploring events</p>

        <form id="loginForm">
          <div class="input-group">
            <label>Username</label>
            <input type="email" placeholder="Enter your username" required />
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required />
          </div>

          <button id="login-btn" type="submit" class="btn-auth">Log In</button>
        </form>

        <p class="switch-text">
          Don’t have an account?
          <a href="signup.html">Sign Up</a>
        </p>
      </div>
    </section>

    <script src="../JS/signUp.js"></script>
  </body>
</html>
